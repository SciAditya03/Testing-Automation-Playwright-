[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_functions = test_*

markers =
    smoke: High-priority quick validation
    regression: Full pre-release suite
    feed: Feed module tests
    chats: Active Chats module tests
    integration: Cross-module workflows

# Only safe, always-available options here
addopts = -v --html=reports/report.html --self-contained-html